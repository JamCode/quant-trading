# 片段：并入 guitar-server.conf 的 HTTPS server {}
# 对外 https://wanghanai.xyz/openclaw/ → 本机 OpenClaw Gateway 18789
# 需在 openclaw.json 设置 gateway.controlUi.basePath = "/openclaw"

location = /openclaw {
    return 301 https://$host/openclaw/;
}

location /openclaw/ {
    proxy_pass http://127.0.0.1:18789/openclaw/;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_send_timeout 86400s;
    proxy_read_timeout 86400s;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
}

# Gateway WebSocket（Control UI 默认连 /__openclaw__/ws，不是 /openclaw）
location /__openclaw__/ {
    proxy_pass http://127.0.0.1:18789/__openclaw__/;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_send_timeout 86400s;
    proxy_read_timeout 86400s;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}
